name: 'Initialize'
description: 'Set up Python and uv, and install project dependencies'
inputs:
  python_version:
    description: 'Python version to install. If omitted, reads from .python-version.'
    default: ''
  resolution:
    description: 'If provided, pass the argument to the uv --resolution flag ("highest" or "lowest-direct").  If omitted, do not use --resolution flag.'
    default: ''
  latest-citrine:
    description: 'If true and citrine-python is a project dependency, install it from the main branch when resolution is highest'
    type: boolean
    default: true
  latest-gemd:
    description: 'If true and gemd-python is a project dependency, install it from the main branch when resolution is highest'
    type: boolean
    default: true
  documentation:
    description: 'If true, include the docs dependency group in uv sync'
    type: boolean
    default: false
  app-id:
    description: 'GitHub App ID for generating a token to access private repositories. If omitted, private repo access is not configured.'
    required: false
    default: ''
  app-private-key:
    description: 'GitHub App private key for generating a token to access private repositories. If omitted, private repo access is not configured.'
    required: false
    default: ''
runs:
  using: "composite"
  steps:
    - name: Check out repository code
      uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python_version }}
    - name: Generate app token
      if: ${{ inputs.app-id != '' && inputs.app-private-key != '' }}
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}
        owner: CitrineInformatics
    - name: Update git to use CitrineInformatics token for repository access
      if: ${{ steps.app-token.outputs.token != '' }}
      run: git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"
      shell: bash
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Pin uv to the requested Python version
      if: ${{ inputs.python_version != '' }}
      run: uv python pin ${{ inputs.python_version }}
      shell: bash
    - name: Install dependencies (default)
      if: ${{ inputs.resolution == '' }}
      run: uv sync --dev ${{ inputs.documentation == 'true' && '--group docs' || '' }}
      shell: bash
    - name: Install dependencies (${{ inputs.resolution }})
      if: ${{ inputs.resolution != '' }}
      run: uv sync --dev --resolution ${{ inputs.resolution }} ${{ inputs.documentation == 'true' && '--group docs' || '' }}
      shell: bash
    - name: Detect installed Citrine dependencies
      id: detect-deps
      if: ${{ inputs.resolution == 'highest' }}
      # uv sync installs the project as editable so it's any easy + robust test for the current package
      run: |
        is_non_editable_dep() {
          local info
          info=$(uv pip show "$1" 2>/dev/null) || return 1
          ! echo "$info" | grep -q "Editable project location"
        }
        echo "has-citrine=$(is_non_editable_dep citrine && echo true || echo false)" >> "$GITHUB_OUTPUT"
        echo "has-gemd=$(is_non_editable_dep gemd && echo true || echo false)" >> "$GITHUB_OUTPUT"
      shell: bash
    - name: Install citrine from main
      if: ${{ inputs.resolution == 'highest' && inputs.latest-citrine == 'true' && steps.detect-deps.outputs.has-citrine == 'true' }}
      run: |
        if ! uv pip install "citrine @ git+https://github.com/CitrineInformatics/citrine-python.git@main" 2>&1; then
          echo "::notice::Failed to install citrine from main (likely unsupported Python version). Falling back to latest compatible release."
          uv pip install --resolution highest citrine
        fi
      shell: bash
    - name: Install gemd from main
      if: ${{ inputs.resolution == 'highest' && inputs.latest-gemd == 'true' && steps.detect-deps.outputs.has-gemd == 'true' }}
      run: |
        if ! uv pip install "gemd @ git+https://github.com/CitrineInformatics/gemd-python.git@main" 2>&1; then
          echo "::notice::Failed to install gemd from main (likely unsupported Python version). Falling back to latest compatible release."
          uv pip install --resolution highest gemd
        fi
      shell: bash
