name: PR Checks

on:
  workflow_call:
    inputs:
      src:
        description: 'The path to the source directory.'
        required: true
        type: string
      linter:
        description: 'Which linter to run. Must be one of: ruff, flake8, black, none.'
        required: false
        type: string
        default: 'ruff'
      check_version_bump:
        description: 'If true, verify that the version in pyproject.toml has been incremented.'
        required: false
        type: boolean
        default: true
      check_deprecation:
        description: 'If true, verify that no deprecated code is past its removed-in version.'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  validate-inputs:
    name: Validate workflow inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate linter input
        run: |
          case "${{ inputs.linter }}" in
            ruff|flake8|black|none) ;;
            *) echo "::error::Invalid linter '${{ inputs.linter }}'. Must be one of: ruff, flake8, black, none." && exit 1 ;;
          esac
        shell: bash

  linting:
    name: Run linting with ruff
    needs: validate-inputs
    if: ${{ inputs.linter == 'ruff' }}
    runs-on: ubuntu-latest
    steps:
      # Simple checkout before initialize allows common-gh-actions to use its own workflows
      - name: Simple checkout
        uses: actions/checkout@v6
      - name: Initialize development environment
        uses: ./.github/actions/initialize
      - name: Run ruff check
        run: uv run ruff check ${{ inputs.src }}
      - name: Run ruff format check
        run: uv run ruff format --check ${{ inputs.src }}

  linting-latest:
    name: Run linting with latest version of ruff (non-blocking)
    needs: validate-inputs
    if: ${{ inputs.linter == 'ruff' }}
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Run ruff check
        run: uvx ruff check ${{ inputs.src }}
      - name: Run ruff format check
        run: uvx ruff format --check ${{ inputs.src }}

  linting-flake8:
    name: Run linting with flake8
    needs: validate-inputs
    if: ${{ inputs.linter == 'flake8' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Initialize the development environment
        uses: ./.github/actions/initialize
      - name: Lint the source directory
        run: uv run flake8 ${{ inputs.src }}

  linting-black:
    name: Run formatting check with black
    needs: validate-inputs
    if: ${{ inputs.linter == 'black' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Initialize the development environment
        uses: ./.github/actions/initialize
      - name: Run black format check
        run: uv run black --check ${{ inputs.src }}

  version-bump:
    name: Verify version has been incremented
    if: ${{ inputs.check_version_bump }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v6
      - name: Check out main branch
        uses: actions/checkout@v6
        with:
          ref: main
          path: main
      - name: Verify version bump
        uses: ./.github/actions/check-version-bump
        with:
          pr_path: .
          main_path: main

  deprecation-check:
    name: Verify deprecated code has been removed
    if: ${{ inputs.check_deprecation }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - name: Check for expired deprecations
        uses: ./.github/actions/check-deprecations
        with:
          src: ${{ inputs.src }}
