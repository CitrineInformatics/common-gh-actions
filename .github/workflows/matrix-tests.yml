name: PR Tests

on:
  workflow_call:
    inputs:
      src:
        description: 'The path to the source directory.'
        required: true
        type: string
      skip_38:
        description: 'If true, omit Python 3.8 from the test matrix. Default: true'
        required: false
        type: boolean
        default: true
      skip_39:
        description: 'If true, omit Python 3.9 from the test matrix. Default: true'
        required: false
        type: boolean
        default: true
      skip_310:
        description: 'If true, omit Python 3.10 from the test matrix. Default: false'
        required: false
        type: boolean
        default: false
      skip_311:
        description: 'If true, omit Python 3.11 from the test matrix. Default: false'
        required: false
        type: boolean
        default: false
      include_313:
        description: 'If true, include Python 3.13 in the test matrix. Default: true'
        required: false
        type: boolean
        default: true
      include_314:
        description: 'If true, include Python 3.14 in the test matrix. Default: true'
        required: false
        type: boolean
        default: true
      include_315:
        description: 'If true, include Python 3.15 in the test matrix. Default: false'
        required: false
        type: boolean
        default: false
      coverage_fails_under:
        description: 'Minimum required coverage percentage for run-tests-default. Default: 100'
        required: false
        type: number
        default: 100
      branch_coverage:
        description: 'If true, include --cov-branch in coverage flags for run-tests-default. Default: false'
        required: false
        type: boolean
        default: false
      include_windows:
        description: 'If true, include windows-latest in the test matrix. Default: true'
        required: false
        type: boolean
        default: true
      include_macos:
        description: 'If true, include macos-latest in the test matrix. Default: true'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  run-tests-default:
    name: Execute unit tests with default configuration
    runs-on: ubuntu-latest
    steps:
      # Simple checkout before initialize allows common-gh-actions to use its own workflows
      - name: Simple checkout
        uses: actions/checkout@v6
      - name: Initialize the environment
        uses: CitrineInformatics/common-gh-actions/.github/actions/initialize@v3
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          app-private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
      - name: Execute unit tests
        env:
          CITRINE_API_HOST: _TEST_HOST
          CITRINE_API_KEY: _TEST_KEY
        run: uv run --no-sync pytest --cov=${{ inputs.src }} ${{ inputs.branch_coverage == true && '--cov-branch' || '' }} --cov-report term-missing:skip-covered --no-cov-on-fail --cov-fail-under=${{ inputs.coverage_fails_under }} tests/

  matrix-prep:
    needs: run-tests-default
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.interpolator.outputs.versions }}
      runner-os: ${{ steps.interpolator.outputs.runner-os }}
    steps:
      - name: Determine Python versions and OSes to test
        id: interpolator
        shell: bash
        run: |
          python -c "
          import json
          skip = {
              '3.8': '${{ inputs.skip_38 }}',
              '3.9': '${{ inputs.skip_39 }}',
              '3.10': '${{ inputs.skip_310 }}',
              '3.11': '${{ inputs.skip_311 }}',
          }
          include = {
              '3.13': '${{ inputs.include_313 }}',
              '3.14': '${{ inputs.include_314 }}',
              '3.15': '${{ inputs.include_315 }}',
          }
          versions = [v for v, s in skip.items() if s != 'true']
          versions += ['3.12']
          versions += [v for v, i in include.items() if i == 'true']
          runner_os = ['ubuntu-latest']
          if '${{ inputs.include_windows }}' == 'true':
              runner_os.append('windows-latest')
          if '${{ inputs.include_macos }}' == 'true':
              runner_os.append('macos-latest')
          print(f'versions={json.dumps(versions)}')
          print(f'runner-os={json.dumps(runner_os)}')
          " >> "$GITHUB_OUTPUT"
          cat "$GITHUB_OUTPUT"

  run-tests:
    name: Execute unit tests
    continue-on-error: true
    needs: matrix-prep
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.matrix-prep.outputs.versions) }}
        runner-os: ${{ fromJson(needs.matrix-prep.outputs.runner-os) }}
    runs-on: ${{ matrix.runner-os }}
    steps:
      # Simple checkout before initialize allows common-gh-actions to use its own workflows
      - name: Simple checkout
        uses: actions/checkout@v6
      - name: Initialize the environment
        uses: CitrineInformatics/common-gh-actions/.github/actions/initialize@v3
        with:
          python_version: ${{ matrix.python-version }}
          resolution: lowest-direct
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          app-private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
      - name: Execute unit tests
        env:
          CITRINE_API_HOST: _TEST_HOST
          CITRINE_API_KEY: _TEST_KEY
        run: uv run --no-sync pytest tests/

  run-tests-against-latest:
    # These runs test against the main branches of citrine-python and gemd-python to catch
    # breaking changes before they're released to PyPI. Since these are unreleased versions,
    # failures are informational rather than blocking.
    name: Non-blocking - Execute unit tests against latest version of dependencies
    continue-on-error: true
    needs: matrix-prep
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.matrix-prep.outputs.versions) }}
        runner-os: ${{ fromJson(needs.matrix-prep.outputs.runner-os) }}
    runs-on: ${{ matrix.runner-os }}
    steps:
      # Simple checkout before initialize allows common-gh-actions to use its own workflows
      - name: Simple checkout
        uses: actions/checkout@v6
      - name: Initialize the environment
        uses: CitrineInformatics/common-gh-actions/.github/actions/initialize@v3
        with:
          python_version: ${{ matrix.python-version }}
          resolution: highest
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          app-private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
      - name: Execute unit tests
        env:
          CITRINE_API_HOST: _TEST_HOST
          CITRINE_API_KEY: _TEST_KEY
        run: uv run --no-sync pytest tests/
